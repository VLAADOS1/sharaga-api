spring:
  datasource:
    url: jdbc:h2:mem:hack_api_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC

app:
  jwt:
    secret: test_secret_for_home_budget_api_please_change_it
    access-min: 15
    refresh-days: 30
  auth:
    rl-max: 200
    rl-sec: 60
